AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ClassYear Serverless Application - Lambda + API Gateway + RDS

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs24.x
    Tracing: Active
    VpcConfig: !If
      - CreateRDS
      - SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
      - !Ref AWS::NoValue
    Environment:
      Variables:
        NODE_ENV: !Ref Environment
        DB_HOST: !If [IsLocalStack, 'postgres', !GetAtt RDSCluster.Endpoint.Address]
        DB_PORT: '5432'
        DB_NAME: class_reunion
        DB_USER: classyear_admin
        JWT_SECRET: !Ref JWTSecret
        ADMIN_SEED_PASSWORD_PARAM: !If [IsLocalStack, !Ref 'AWS::NoValue', !Ref AdminSeedPasswordParam]
        FRONTEND_URL: !Ref FrontendURL
        S3_BUCKET_NAME: !Ref ReunionConnectPrivateFileBucket
        DATABASE_SECRET_ARN: !If [IsLocalStack, !Ref 'AWS::NoValue', !GetAtt RDSCluster.MasterUserSecret.SecretArn]

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Environment name

  JWTSecret:
    Type: String
    NoEcho: true
    Description: JWT secret for token signing

  AdminSeedPasswordParam:
    Type: String
    Default: '/classyear/dev/admin-seed-password'
    Description: Name of the SSM SecureString parameter holding the admin seed password; seeding is skipped if the parameter does not exist

  FrontendURL:
    Type: String
    Default: http://localhost:5173
    Description: Frontend URL for CORS and registration links

  UseLocalStack:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Whether to use LocalStack (true) or AWS (false)

  VPC:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for RDS and Lambda security groups (required when UseLocalStack=false)

  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First private subnet for RDS (required when UseLocalStack=false)

  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second private subnet for RDS (required when UseLocalStack=false)

  PrivateRouteTable:
    Type: String
    Description: Route table of the private subnets, for the S3 gateway endpoint (required when UseLocalStack=false)

  DomainName:
    Type: String
    Default: reunion-connect.org
    Description: Custom domain for the frontend

  HostedZoneId:
    Type: String
    Default: Z0466195259YGZ44DUBMY
    Description: Route53 hosted zone ID for DomainName

Conditions:
  IsProduction: !Equals [!Ref Environment, prod]
  IsLocalStack: !Equals [!Ref UseLocalStack, 'true']
  CreateRDS: !Not [!Condition IsLocalStack]
  DeployFrontend: !Not [!Condition IsLocalStack]

Resources:
  # S3 Storage Bucket with public read restricted to /public/ prefix
  ReunionConnectPrivateFileBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "classyear-file-storage-${AWS::AccountId}-${Environment}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: false
        IgnorePublicAcls: true
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - !Ref FrontendURL
            AllowedMethods:
              - PUT
              - GET
            AllowedHeaders:
              - '*'
            MaxAge: 3600

  PublicDirectoryReadPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ReunionConnectPrivateFileBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadForSpecificDirectory
            Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "arn:aws:s3:::${ReunionConnectPrivateFileBucket}/public/*"

  # Shared policy granting all Lambda functions access to RDS credentials secret
  LambdaSecretsManagerPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Allow Lambda functions to read RDS credentials from Secrets Manager
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:*"
          - Effect: Allow
            Action:
              - ssm:GetParameter
            Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/classyear/*"
          # ENI management so functions can run inside the VPC (SAM may not
          # auto-attach AWSLambdaVPCAccessExecutionRole when VpcConfig is conditional)
          - Effect: Allow
            Action:
              - ec2:CreateNetworkInterface
              - ec2:DescribeNetworkInterfaces
              - ec2:DeleteNetworkInterface
              - ec2:DescribeSubnets
              - ec2:AssignPrivateIpAddresses
              - ec2:UnassignPrivateIpAddresses
            Resource: '*'

  # API Gateway
  ClassYearAPI:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      TracingEnabled: true
      Cors:
        AllowMethods: "'GET, POST, PUT, DELETE, OPTIONS'"
        AllowHeaders: "'Content-Type, Authorization'"
        AllowOrigin: "'*'"

  # Auth Routes
  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'classyear-login-${Environment}'
      CodeUri: backend/
      Handler: dist/src/lambda/auth.loginHandler
      Events:
        PostLogin:
          Type: Api
          Properties:
            RestApiId: !Ref ClassYearAPI
            Path: /api/auth/login
            Method: POST
      Policies:
        - !Ref LambdaSecretsManagerPolicy

  RegisterFunction:
