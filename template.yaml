          Type: Api
          Properties:
            RestApiId: !Ref ClassYearAPI
            Path: /api/users/{userId}/photo/{photoType}
            Method: DELETE
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReunionConnectPrivateFileBucket
        - !Ref LambdaSecretsManagerPolicy

  GetPhotoPresignedUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'classyear-get-photo-url-${Environment}'
      CodeUri: backend/
      Handler: dist/src/lambda/photos.getPhotoPresignedUrlHandler
      Events:
        GetPhoto:
          Type: Api
          Properties:
            RestApiId: !Ref ClassYearAPI
            Path: /api/photos/presigned
            Method: GET
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref ReunionConnectPrivateFileBucket
        - !Ref LambdaSecretsManagerPolicy

  # Optional: Aurora Serverless v2 database (only for AWS, not LocalStack).
  # MinCapacity 0 lets the cluster pause when idle (~15s resume on first
  # connection) so cold-start behavior is observable in every environment.
  RDSCluster:
    Type: AWS::RDS::DBCluster
    Condition: CreateRDS
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBClusterIdentifier: !Sub 'classyear-${Environment}'
      Engine: aurora-postgresql
      EngineVersion: '17.9'
      DatabaseName: class_reunion
      MasterUsername: classyear_admin
      ManageMasterUserPassword: true
      StorageEncrypted: true
      ServerlessV2ScalingConfiguration:
        MinCapacity: 0
        MaxCapacity: !If [IsProduction, 8, 2]
        SecondsUntilAutoPause: 300
      VpcSecurityGroupIds:
        - !Ref DBSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      BackupRetentionPeriod: !If [IsProduction, 30, 1]

  RDSWriterInstance:
    Type: AWS::RDS::DBInstance
    Condition: CreateRDS
    Properties:
      DBInstanceIdentifier: !Sub 'classyear-${Environment}-writer'
      DBClusterIdentifier: !Ref RDSCluster
      DBInstanceClass: db.serverless
      Engine: aurora-postgresql
      PubliclyAccessible: false

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: CreateRDS
    Properties:
      GroupDescription: Security group for RDS
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSecurityGroup

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: CreateRDS
    Properties:
      GroupDescription: Security group for Lambda functions
      VpcId: !Ref VPC

  # VPC endpoints so in-VPC Lambdas can reach AWS services without a NAT gateway
  VPCEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: CreateRDS
    Properties:
      GroupDescription: Allow HTTPS from Lambda functions to VPC endpoints
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref LambdaSecurityGroup

  SecretsManagerVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateRDS
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.secretsmanager
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  SSMVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateRDS
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ssm
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  S3VPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateRDS
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Condition: CreateRDS
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  # ---------- Frontend hosting: S3 + CloudFront + ACM + Route53 ----------
  FrontendBucket:
    Type: AWS::S3::Bucket
    Condition: DeployFrontend
    Properties:
      BucketName: !Sub "classyear-frontend-${AWS::AccountId}-${Environment}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: DeployFrontend
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

  FrontendCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: DeployFrontend
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames:
        - !Sub "www.${DomainName}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
        - DomainName: !Sub "www.${DomainName}"
          HostedZoneId: !Ref HostedZoneId

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Condition: DeployFrontend
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "classyear-frontend-oac-${Environment}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: DeployFrontend
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "ClassYear frontend (${Environment})"
        Aliases:
          - !Ref DomainName
          - !Sub "www.${DomainName}"
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: PriceClass_100
        Origins:
          - Id: FrontendS3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt FrontendOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: FrontendS3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # managed CachingOptimized
          Compress: true
        # SPA fallback: S3 returns 403/404 for client-side routes; serve index.html
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        ViewerCertificate:
          AcmCertificateArn: !Ref FrontendCertificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

  FrontendDNSRecords:
    Type: AWS::Route53::RecordSetGroup
    Condition: DeployFrontend
    Properties:
      HostedZoneId: !Ref HostedZoneId
      RecordSets:
        - Name: !Ref DomainName
          Type: A
          AliasTarget:
            DNSName: !GetAtt FrontendDistribution.DomainName
            HostedZoneId: Z2FDTNDATAQYW2  # CloudFront's fixed hosted zone ID
        - Name: !Sub "www.${DomainName}"
          Type: A
          AliasTarget:
            DNSName: !GetAtt FrontendDistribution.DomainName
            HostedZoneId: Z2FDTNDATAQYW2

Outputs:
  APIEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ClassYearAPI}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiEndpoint'

  DatabaseEndpoint:
    Condition: CreateRDS
    Description: RDS Database endpoint
    Value: !GetAtt RDSCluster.Endpoint.Address
    Export:
      Name: !Sub '${AWS::StackName}-DatabaseEndpoint'

  FileBucketName:
    Description: S3 bucket for file storage
    Value: !Ref ReunionConnectPrivateFileBucket
    Export:
      Name: !Sub '${AWS::StackName}-FileBucket'

  FrontendURL:
    Condition: DeployFrontend
    Description: Frontend website URL
    Value: !Sub 'https://${DomainName}'

  FrontendBucketName:
    Condition: DeployFrontend
    Description: S3 bucket holding the built frontend
    Value: !Ref FrontendBucket

  FrontendDistributionId:
    Condition: DeployFrontend
    Description: CloudFront distribution ID (for cache invalidation)
    Value: !Ref FrontendDistribution

  SAMLocalCommand:
    Description: Command to run SAM local server
    Value: 'sam local start-api --port 3001 --docker-network localstack'
