version = 0.1

[default]
[default.build]
cached = true
parallel = true

[default.build.parameters]

[default.local_start_api]
port = 3001
docker_network = "classyear_local"
parameter_overrides = "Environment=dev UseLocalStack=true DBPassword=testpass JWTSecret=test-secret-key FrontendURL=http://localhost:5173"

[default.deploy]
[default.deploy.parameters]
stack_name = "classyear-serverless"
s3_bucket = "classyear-serverless-artifacts"
s3_prefix = "classyear-sam"
region = "us-east-1"
confirm_changeset = false
capabilities = "CAPABILITY_IAM"
parameter_overrides = "Environment=dev UseLocalStack=false DBPassword=changeme JWTSecret=change-me-in-production FrontendURL=https://classyear.example.com"
